name: ci

on:
  push:
    branches: [main, nf-core-like-pipelines]
  pull_request:

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check bin tests
      - name: Test
        run: pytest -q

  nextflow-stub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: nf-core/setup-nextflow@v2
      - name: Stub run
        run: nextflow run . -profile test -stub-run
