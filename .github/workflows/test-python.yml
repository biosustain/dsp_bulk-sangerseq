name: Test Python Scripts

on:
  push:
    branches:
      - main
    paths:
      - '*.py'
      - 'config.yaml'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'data/**'
      - '.github/workflows/test-python.yml'
  pull_request:
    paths:
      - '*.py'
      - 'config.yaml'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'data/**'
  workflow_dispatch:

jobs:
  test-python-scripts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        script: [
            'bin/tracy_bulk_docker_samplesheet.py',
            'bin/tracy_postprocesssing.py',
            'bin/tracy_render_visualisations.py',
            'bin/vuegen_report.py'
        ]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
      
    - name: Pull Tracy Docker image
      run: docker pull geargenomics/tracy:latest
        
    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        
    - name: Install dependencies
      run: |
        pipenv install --dev
        
    - name: Verify test data files
      run: |
        ls data/test_data_1/

    - name: Test ${{ matrix.script }}
      run: |
        pipenv run python ${{ matrix.script }}

    - name: Resolve output folder based on config.yaml
      if: always()
      id: resolve_outdir
      run: |
        echo "::set-output name=outdir::$(yq '.paths.outdir_host' config.yaml)"
        
    - name: Upload test outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: python-test-outputs
        path: ${{ steps.resolve_outdir.outputs.outdir }}
        retention-days: 3
