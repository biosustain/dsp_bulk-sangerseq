name: Test Python Scripts

on:
  push:
    paths:
      - '*.py'
      - 'config.yaml'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'data/**'
      - '.github/workflows/test-python.yml'
  pull_request:
    paths:
      - '*.py'
      - 'config.yaml'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'data/**'
  workflow_dispatch:

jobs:
  test-python-scripts:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
    
    defaults:
      run:
        shell: ${{ matrix.shell }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
      
    - name: Pull Tracy Docker image
      run: docker pull geargenomics/tracy:latest
        
    - name: Install pipenv
      run: |
        python -m pip install --upgrade pip
        pip install pipenv
        
    - name: Install dependencies
      run: |
        pipenv install --dev
        
    - name: Verify test data files
      run: |
        ls data/test_data_1/
        
    - name: Test ab1_exploration.py
      if: always()
      run: |
        pipenv run python ab1_exploration.py
        
    - name: Test tracy_bulk_docker.py
      if: always()
      run: |
        pipenv run python -m py_compile tracy_bulk_docker.py

    - name: Test tracy_bulk_docker_samplesheet.py
      if: always()
      run: |
        pipenv run python -m py_compile tracy_bulk_docker_samplesheet.py
        
    - name: Test tracy_postprocesssing.py
      if: always()
      run: |
        pipenv run python tracy_postprocesssing.py
        
    - name: Test tracy_render_align.py
      if: always()
      run: |
        pipenv run python tracy_render_align.py

    - name: Resolve output folder based on config.yaml
      id: resolve_outdir
      run: |
        echo "::set-output name=outdir::$(yq '.paths.outdir_host' config.yaml)"
        
    - name: Upload test outputs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: python-test-outputs-${{ matrix.os }}
        path: ${{ steps.resolve_outdir.outputs.outdir }}
        retention-days: 3